<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amdox ERP – Finance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <i class="bi bi-grid-3x3-gap-fill me-2"></i>
      <span>Amdox ERP</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">MAIN MENU</div>
      <a href="dashboard.html" class="nav-link">
        <i class="bi bi-speedometer2"></i><span>Dashboard</span>
      </a>
      <a href="employees.html" class="nav-link">
        <i class="bi bi-people"></i><span>Employees</span>
      </a>
      <a href="inventory.html" class="nav-link">
        <i class="bi bi-box-seam"></i><span>Inventory</span>
      </a>
      <a href="finance.html" class="nav-link active">
        <i class="bi bi-cash-stack"></i><span>Finance</span>
      </a>
      <a href="analytics.html" class="nav-link">
        <i class="bi bi-bar-chart-line"></i><span>Analytics</span>
      </a>
      <div class="nav-divider"></div>
      <div class="nav-section-label">SYSTEM</div>
      <a href="#" class="nav-link">
        <i class="bi bi-gear"></i><span>Settings</span>
      </a>
      <a href="index.html" class="nav-link logout-link">
        <i class="bi bi-box-arrow-left"></i><span>Logout</span>
      </a>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-content" id="mainContent">

    <!-- NAVBAR -->
    <header class="top-navbar">
      <button class="hamburger-btn" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>
      <div class="navbar-title">
        <h5>Finance Module</h5>
        <small>Home / Finance</small>
      </div>
      <div class="navbar-right">
        <div class="search-box">
          <i class="bi bi-search"></i>
          <input type="text" placeholder="Search...">
        </div>
        <button class="icon-btn">
          <i class="bi bi-bell"></i>
          <span class="badge-dot">3</span>
        </button>
        <div class="profile-avatar">A</div>
      </div>
    </header>

    <!-- PAGE BODY -->
    <main class="page-body">

      <!-- SUMMARY CARDS -->
      <div class="row g-3 mb-4">
        <div class="col-12 col-sm-6 col-xl-4">
          <div class="summary-card">
            <div class="summary-icon green">
              <i class="bi bi-arrow-down-circle-fill"></i>
            </div>
            <div class="summary-info">
              <span class="summary-label">Total Income</span>
              <span class="summary-value" id="totalIncome">₹0</span>
              <span class="summary-sub">All time</span>
            </div>
          </div>
        </div>
        <div class="col-12 col-sm-6 col-xl-4">
          <div class="summary-card">
            <div class="summary-icon red">
              <i class="bi bi-arrow-up-circle-fill"></i>
            </div>
            <div class="summary-info">
              <span class="summary-label">Total Expense</span>
              <span class="summary-value" id="totalExpense">₹0</span>
              <span class="summary-sub">All time</span>
            </div>
          </div>
        </div>
        <div class="col-12 col-sm-6 col-xl-4">
          <div class="summary-card">
            <div class="summary-icon blue">
              <i class="bi bi-wallet2"></i>
            </div>
            <div class="summary-info">
              <span class="summary-label">Net Balance</span>
              <span class="summary-value" id="netBalance">₹0</span>
              <span class="summary-sub">Income − Expense</span>
            </div>
          </div>
        </div>
      </div>

      <!-- ACTION BAR -->
      <div class="action-bar">
        <div class="action-search">
          <i class="bi bi-search"></i>
          <input type="text" id="searchInput"
            placeholder="Search by description..."
            oninput="handleSearch()">
        </div>
        <select class="action-select" id="typeFilter"
          onchange="handleSearch()">
          <option value="">All Types</option>
          <option value="Income">Income</option>
          <option value="Expense">Expense</option>
        </select>
        <select class="action-select" id="monthFilter"
          onchange="handleSearch()">
          <option value="">All Months</option>
          <option value="0">January</option>
          <option value="1">February</option>
          <option value="2">March</option>
          <option value="3">April</option>
          <option value="4">May</option>
          <option value="5">June</option>
          <option value="6">July</option>
          <option value="7">August</option>
          <option value="8">September</option>
          <option value="9">October</option>
          <option value="10">November</option>
          <option value="11">December</option>
        </select>
        <button class="btn-add" onclick="openAddModal('Income')" style="background:#16a34a;">
          <i class="bi bi-plus-lg"></i> Add Income
        </button>
        <button class="btn-add" onclick="openAddModal('Expense')" style="background:#dc2626; margin-left:0;">
          <i class="bi bi-plus-lg"></i> Add Expense
        </button>
      </div>

      <!-- DATA TABLE CARD -->
      <div class="data-card">
        <div class="data-card-header">
          <h6>All Transactions</h6>
          <span id="recordCount"
            style="font-size:0.8rem; color:#64748b;"></span>
        </div>

        <div class="table-responsive">
          <table class="erp-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Description</th>
                <th>Category</th>
                <th>Type</th>
                <th>Date</th>
                <th>Amount</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="transactionTableBody"></tbody>
          </table>
        </div>

        <div class="pagination-bar">
          <span id="paginationInfo"></span>
          <div class="pagination-btns" id="paginationBtns"></div>
        </div>

      </div>

    </main>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"
    onclick="toggleSidebar()"></div>

  <!-- ═══════════════════════════════════════════
       ADD TRANSACTION MODAL
  ════════════════════════════════════════════ -->
  <div class="modal fade" id="transactionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Add Income</h5>
          <button type="button" class="btn-close"
            data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <!-- Hidden field tracks whether this is Income or Expense -->
          <input type="hidden" id="txnType">

          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Description *</label>
              <input type="text" class="form-control"
                id="txnDescription" placeholder="e.g. Client Invoice - TechCorp">
            </div>
            <div class="col-md-6">
              <label class="form-label">Category *</label>
              <select class="form-select" id="txnCategory">
                <option value="">Select Category</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Amount (₹) *</label>
              <input type="number" class="form-control"
                id="txnAmount" placeholder="e.g. 50000">
            </div>
            <div class="col-12">
              <label class="form-label">Date *</label>
              <input type="date" class="form-control" id="txnDate">
            </div>
          </div>

          <div id="formError"
            class="alert alert-danger mt-3 d-none"
            style="font-size:0.85rem; border-radius:8px;"></div>
        </div>

        <div class="modal-footer">
          <button class="btn-cancel"
            data-bs-dismiss="modal">Cancel</button>
          <button class="btn-save"
            onclick="saveTransaction()">Save Transaction</button>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/finance.js"></script>
</body>
</html>
